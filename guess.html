    <body>

        </nav>
        <section class="game">
            <h2>The Rules Are Simple</h2>
            <ul>
                <li>There will be total of 5 hints!!</li>

                <li>Use your knowledge and guess the person</li>

        </section>
        <section class="guess">

            <ol id="hint"></ol>
            <button onclick="showNextHint()">Next</button>
            <br><br>
            <input type="text" id="guessInput" placeholder="Enter your guess">
            <br><br>
            <button onclick="checkGuess()">Submit Guess</button>

        </section>

// Pick a random person
let chosenPerson = people[Math.floor(Math.random() * people.length)];
let currentHint = 0;
let attempts = 3;

// Show the first hint immediately
document.getElementById("hint").innerHTML += `<li>${chosenPerson.hints[currentHint]}</li>`;

// Function to show next hint
function showNextHint() {
  currentHint++; 
  document.getElementById("hint").innerHTML += `<li>${chosenPerson.hints[currentHint]}</li>`;
  
}

// Function to check guess
function checkGuess() {
  let guess = document.getElementById("guessInput").value;
  if (guess.toLowerCase() === chosenPerson.name.toLowerCase()) {
    alert("Correct! You guessed the person!");
  } else {
    attempts--;
    if (attempts > 0) {
      alert("Wrong guess! Attempts left: " + attempts);
    } else {
      alert("Game Over! The person was " + chosenPerson.name);
    }
  }
}
