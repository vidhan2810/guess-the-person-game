// Pick a random person
let chosenPerson = people[Math.floor(Math.random() * people.length)];
let currentHint = 0;
let attempts = 3;

// Show the first hint immediately
document.getElementById("hint").innerHTML += `<li>${chosenPerson.hints[currentHint]}</li>`;

// Function to show next hint
function showNextHint() {
  currentHint++; 
  document.getElementById("hint").innerHTML += `<li>${chosenPerson.hints[currentHint]}</li>`;
  
}

// Function to check guess
function checkGuess() {
  let guess = document.getElementById("guessInput").value;
  let messageBox = document.getElementById("message");
  if (guess.toLowerCase() === chosenPerson.name.toLowerCase()) {
    messageBox.textContent = "✅ Correct! You guessed the person!";
    messageBox.style.color = "green";  } 
    else {
    attempts--;
    if (attempts > 0) {
      messageBox.textContent = "❌ Wrong guess! Attempts left: " + attempts;
      messageBox.style.color = "red";
    } else {
      messageBox.textContent = "💀 Game Over! The person was " + chosenPerson.name;
      messageBox.style.color = "darkred";
    }
  }
